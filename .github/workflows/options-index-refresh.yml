name: Options Index Refresh

on:
  schedule:
    - cron: "7,22,37,52 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: options-index-refresh
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger options index refresh
        env:
          OPTIONS_INDEX_CRON_SECRET: ${{ secrets.OPTIONS_INDEX_CRON_SECRET }}
          OPTIONS_INDEX_REFRESH_URL: ${{ secrets.OPTIONS_INDEX_REFRESH_URL }}
        run: |
          set -euo pipefail

          if [ -z "${OPTIONS_INDEX_REFRESH_URL}" ]; then
            echo "OPTIONS_INDEX_REFRESH_URL secret is required." >&2
            exit 1
          fi

          if [ -z "${OPTIONS_INDEX_CRON_SECRET}" ]; then
            echo "OPTIONS_INDEX_CRON_SECRET secret is required." >&2
            exit 1
          fi

          base_url="${OPTIONS_INDEX_REFRESH_URL%/}"

          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${OPTIONS_INDEX_CRON_SECRET}" \
            --header "Content-Type: application/json" \
            "${base_url}/api/cron/wheel/options-index-refresh"
