name: Wheel Deep Scan Coverage

on:
  schedule:
    - cron: "0 * * * 1-5"
  workflow_dispatch:

jobs:
  deep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger wheel deep scan coverage
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WHEEL_DEEP_SCAN_CRON_URL: ${{ secrets.WHEEL_DEEP_SCAN_CRON_URL }}
        run: |
          if [ -z "$WHEEL_DEEP_SCAN_CRON_URL" ]; then
            echo "WHEEL_DEEP_SCAN_CRON_URL secret is required."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is required."
            exit 1
          fi

          for attempt in {1..20}; do
            body_file="$(mktemp)"
            status_code="$(curl --show-error --silent \
              --output "$body_file" \
              --write-out "%{http_code}" \
              --request GET \
              --header "Authorization: Bearer $CRON_SECRET" \
              "$WHEEL_DEEP_SCAN_CRON_URL")"

            cat "$body_file"

            if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 300 ]; then
              exit 0
            fi

            if [ "$status_code" = "404" ] || [ "$status_code" -ge 500 ]; then
              echo "Deep scan endpoint returned $status_code on attempt $attempt; retrying after deploy/cache propagation."
              sleep 15
              continue
            fi

            echo "Deep scan endpoint returned non-retryable status $status_code."
            exit 1
          done

          echo "Deep scan endpoint did not become available after retries."
          exit 1
