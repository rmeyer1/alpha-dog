name: Wheel Earnings Refresh

on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

jobs:
  earnings-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger wheel earnings refresh
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WHEEL_EARNINGS_CRON_URL: ${{ secrets.WHEEL_EARNINGS_CRON_URL }}
        run: |
          if [ -z "$WHEEL_EARNINGS_CRON_URL" ]; then
            echo "WHEEL_EARNINGS_CRON_URL secret is required."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is required."
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request GET \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$WHEEL_EARNINGS_CRON_URL"
